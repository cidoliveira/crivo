# Alembic configuration file.
# The sqlalchemy.url is intentionally empty — it is set programmatically
# in alembic/env.py from pydantic-settings (reads DATABASE_URL from .env).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Empty — overridden in env.py from app.config.get_settings()
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
